  /:
    get:
      operationId: AppController_getHello
      parameters: []
      responses:
        '200':
          description: ''
info:
  title: Home Library Service
  description: Home music library service
  version: '1.0'
  contact: {}
tags: []
servers:
  - url: /
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
          format: uuid
        login:
          type: string
          example: TestUser
        version:
          type: number
          example: 1
          description: Entity version. Auto-incremented on each update
        createdAt:
          type: number
          example: 1655000000
        updatedAt:
          type: number
          example: 1655000000
      required:
        - id
        - login
        - version
        - createdAt
        - updatedAt
    CreateUserDto:
      type: object
      properties:
        login:
          type: string
          example: TestUser
          format: uuid
        password:
          type: string
          example: test-password
      required:
        - login
        - password
    UpdatePasswordDto:
      type: object
      properties:
        oldPassword:
          type: string
          example: test-password
        newPassword:
          type: string
          example: new-password
      required:
        - oldPassword
        - newPassword
    Track:
      type: object
      properties:
        id:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
          format: uuid
        name:
          type: string
          example: Bohemian Rhapsody
        artistId:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
          format: uuid
          nullable: true
        albumId:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
          format: uuid
          nullable: true
        duration:
          type: number
          example: 355
          description: In seconds
      required:
        - id
        - name
        - artistId
        - albumId
        - duration
    CreateTrackDto:
      type: object
      properties:
        name:
          type: string
          example: Bohemian Rhapsody
        artistId:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
          format: uuid
          nullable: true
        albumId:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
          format: uuid
          nullable: true
        duration:
          type: number
          example: 262
          description: In seconds
      required:
        - name
        - artistId
        - albumId
        - duration
    UpdateTrackDto:
      type: object
      properties:
        name:
          type: string
          example: Bohemian Rhapsody
        artistId:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
          format: uuid
          nullable: true
        albumId:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
          format: uuid
          nullable: true
        duration:
          type: number
          example: 262
          description: In seconds
    Artist:
      type: object
      properties:
        id:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
          format: uuid
        name:
          type: string
          example: Freddie Mercury
        grammy:
          type: boolean
          example: false
      required:
        - id
        - name
        - grammy
    CreateArtistDto:
      type: object
      properties:
        name:
          type: string
          example: Freddie Mercury
        grammy:
          type: boolean
          example: false
      required:
        - name
        - grammy
    UpdateArtistDto:
      type: object
      properties:
        name:
          type: string
          example: Freddie Mercury
        grammy:
          type: boolean
          example: false
    Album:
      type: object
      properties:
        id:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
          format: uuid
        name:
          type: string
          example: Innuendo
        year:
          type: number
          example: 1991
        artistId:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
          format: uuid
          nullable: true
      required:
        - id
        - name
        - year
        - artistId
    CreateAlbumDto:
      type: object
      properties:
        name:
          type: string
          example: Innuendo
        year:
          type: number
          example: 1991
        artistId:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
          format: uuid
          nullable: true
      required:
        - name
        - year
        - artistId
    UpdateAlbumDto:
      type: object
      properties:
        name:
          type: string
          example: Innuendo
        year:
          type: number
          example: 1991
        artistId:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
          format: uuid
          nullable: true
    ResponseFavoritesDto:
      type: object
      properties:
        artists:
          example:
            - id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
              name: Freddie Mercury
              grammy: false
          type: array
          items:
            type: string
        albums:
          example:
            - id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
              name: Innuendo
              year: 1991
              artistId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
          type: array
          items:
            type: string
        tracks:
          example:
            - id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
              name: The Show Must Go On
              artistId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
              albumId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
              duration: 262
          type: array
          items:
            type: string
      required:
        - artists
        - albums
        - tracks
